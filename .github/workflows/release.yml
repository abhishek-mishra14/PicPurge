name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: picpurge-linux
          - os: macos-latest
            artifact_name: picpurge-macos
          - os: windows-latest
            artifact_name: picpurge-windows.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Build Wheel
        run: uv build

      - name: Build Standalone Binary (PyInstaller)
        shell: bash
        run: |
          # Use uvx to run pyinstaller without manual installation
          # We include the 'src' directory in the path so pyinstaller can find the package
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          
          uvx --with opencv-python --with pillow --with imagehash --with pillow-heif --with rich --with typer \
            pyinstaller --onefile --name "${{ matrix.artifact_name }}" main.py

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/${{ matrix.artifact_name }}
